name: Build and Deploy

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      hostname:
        description: Host name of the deployed environment
        required: true
        type: string
      base_url:
        description: Base url for the deployed environment. Should start and end with a slash.
        required: false
        default: "/"
        type: string
      environment:
        description: GitHub Actions environment name (used for scoping secrets and deployment)
        required: true
        type: string
      PANTHEON_SITE_ID:
        required: true
        type: string
    secrets:
      PANTHEON_SSH_KEY:
        required: true
      PANTHEON_KNOWN_HOSTS:
        required: true
      PANTHEON_MACHINE_TOKEN:
        required: true
      PANTHEON_AUTH_USER:
        required: true
      PANTHEON_AUTH_PASSWORD:
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.hostname }}${{ inputs.base_url }}
    env:
      CI: true
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=8192 --max-http-header-size=8192"
      HOSTNAME: ${{ inputs.hostname }}
      BASE_URL: ${{ inputs.base_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.PANTHEON_SSH_KEY }}
          known_hosts: ${{ secrets.PANTHEON_KNOWN_HOSTS }}
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - name: Install Terminus
        uses: pantheon-systems/terminus-github-actions@v1
        with:
          pantheon-machine-token: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'yarn'
      - name: Docusaurus Webpack cache
        uses: actions/cache@v3
        with:
          path: node_modules/.cache
          key: ${{ runner.os }}-webpack-cache-${{ hashFiles('yarn.lock') }}
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build the Docusaurus site
        run: yarn build
      - name: Pantheon environment setup
        run: |
          # Check for helpdocs environment in Pantheon, create one if not found
          PANTHEON_ENV_LIST="$(terminus env:list "${{ inputs.PANTHEON_SITE_ID }}" --format=list | xargs)"
          DEV_SITE_EXISTS="$(echo "$PANTHEON_ENV_LIST" | grep "helpdocs" | wc -l | xargs)"
          if [ "$DEV_SITE_EXISTS" -eq "0" ]; then
            terminus multidev:create --no-interaction --no-ansi ${{ inputs.PANTHEON_SITE_ID }}.dev helpdocs
            terminus lock:enable ${{ inputs.PANTHEON_SITE_ID }}.helpdocs -- "${{ secrets.PANTHEON_AUTH_USER }}" "${{ secrets.PANTHEON_AUTH_PASSWORD }}"
          fi
          # Put environment in SFTP mode, because we're using rsync to move files up
          terminus connection:set ${{ inputs.PANTHEON_SITE_ID }}.helpdocs sftp
      - name: Deploy site to helpdocs environment
        run: |
         	terminus self:plugin:install terminus-rsync-plugin
          mv ./build ./helpdocs          
          terminus rsync ./helpdocs ${{ inputs.PANTHEON_SITE_ID }}.helpdocs:/
          terminus env:commit --message "Production build of helpdocs" --force -- ${{ inputs.PANTHEON_SITE_ID }}.helpdocs
